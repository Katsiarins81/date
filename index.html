<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на занятия</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .slot-free { background: linear-gradient(135deg, #064e3b, #065f46); border: 1px solid #10b981; cursor: pointer; transition: all 0.2s; }
        .slot-free:hover { box-shadow: 0 0 20px rgba(16,185,129,0.4); transform: translateY(-2px); }
        .slot-occupied { background: linear-gradient(135deg, #7f1d1d, #6b1a1a); border: 1px solid #ef4444; opacity: 0.7; cursor: not-allowed; }
        .slot-my { background: linear-gradient(135deg, #1e3a5f, #1e3a5f); border: 1px solid #3b82f6; cursor: pointer; }
        .slot-my:hover { box-shadow: 0 0 20px rgba(59,130,246,0.4); transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #6366f1); }
        .btn-primary:hover { background: linear-gradient(135deg, #2563eb, #4f46e5); }
        .day-tab.active { background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; }
        .day-tab { background: rgba(51,65,85,0.5); color: #94a3b8; cursor: pointer; transition: all 0.2s; }
        .day-tab:hover:not(.active) { background: rgba(71,85,105,0.7); color: #e2e8f0; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        
        .overflow-y-auto {
    position: absolute !important;
    top: 30px;
    max-height: 90%;
    overflow-Y: hidden;
}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .modal-bg { background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); }
        input, select, textarea { background: rgba(30,41,59,0.9) !important; border: 1px solid rgba(71,85,105,0.5) !important; color: white !important; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6 !important; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        button { cursor: pointer; }
        .scrollable-list { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .scrollable-list::-webkit-scrollbar { width: 5px; }
        .scrollable-list::-webkit-scrollbar-track { background: rgba(30,41,59,0.5); border-radius: 3px; }
        .scrollable-list::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 3px; }
    </style>
</head>
<body>

<header class="glass sticky top-0 z-50 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-xl">📅</div>
            <div>
                <h1 class="text-lg font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">Расписание занятий</h1>
                <p class="text-xs text-slate-500">Запись онлайн</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="adminBtn" class="px-3 py-1.5 rounded-lg text-sm glass hover:bg-white/10 transition-all">⚙️ Админ</button>
            <button id="myBookingsBtn" class="px-3 py-1.5 rounded-lg text-sm bg-blue-600 hover:bg-blue-700 transition-all">📋 Мои записи</button>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-5">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        <div class="glass rounded-xl p-4 text-center"><div class="text-2xl font-bold text-emerald-400" id="stFree">0</div><div class="text-xs text-slate-400">Свободно</div></div>
        <div class="glass rounded-xl p-4 text-center"><div class="text-2xl font-bold text-red-400" id="stBusy">0</div><div class="text-xs text-slate-400">Занято</div></div>
        <div class="glass rounded-xl p-4 text-center"><div class="text-2xl font-bold text-blue-400" id="stTotal">0</div><div class="text-xs text-slate-400">Всего слотов</div></div>
        <div class="glass rounded-xl p-4 text-center"><div class="text-2xl font-bold text-purple-400" id="stTypes">0</div><div class="text-xs text-slate-400">Видов занятий</div></div>
    </div>

    <div class="glass rounded-xl p-4 mb-5">
        <div class="flex items-center justify-between mb-3">
            <button id="prevWeekBtn" class="w-9 h-9 rounded-lg hover:bg-white/10 transition-all text-lg">◀</button>
            <h2 class="font-semibold text-sm" id="weekLabel"></h2>
            <button id="nextWeekBtn" class="w-9 h-9 rounded-lg hover:bg-white/10 transition-all text-lg">▶</button>
        </div>
        <div class="grid grid-cols-7 gap-1.5" id="dayTabs"></div>
    </div>

    <div class="flex items-center gap-2 mb-4 overflow-x-auto pb-1">
        <span class="text-xs text-slate-500 whitespace-nowrap">Фильтр:</span>
        <button data-filter="all" class="filter-btn px-3 py-1 rounded-full text-xs font-medium bg-blue-600 text-white">Все</button>
        <div id="filterBtns" class="flex gap-1.5"></div>
    </div>

    <div class="glass rounded-xl p-4 mb-5"><div id="grid" class="space-y-2"></div></div>
    <div class="flex flex-wrap gap-5 text-xs text-slate-400">
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-emerald-700 border border-emerald-500" style={background: #10b981;}></span> Свободно</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-red-900 border border-red-600"></span> Занято</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-blue-900 border border-blue-500"></span> Ваша запись</span>
    </div>
</main>

<!-- Модальные окна -->
<div id="mBooking" class="fixed inset-0 z-50 hidden items-center justify-center modal-bg">
    <div class="glass rounded-2xl p-6 max-w-md w-full mx-4 fade-in">
        <div class="flex justify-between mb-4"><h3 class="text-lg font-bold">📝 Запись</h3><button class="closeModalBtn text-slate-400 hover:text-white text-2xl">&times;</button></div>
        <div id="bkInfo" class="mb-4 p-3 rounded-lg bg-white/5 text-sm"></div>
        <form id="bookingForm" class="space-y-3">
            <input type="text" id="bkName" required placeholder="Ваше имя *" class="w-full px-3 py-2 rounded-lg border">
            <input type="tel" id="bkPhone" required placeholder="Телефон *" class="w-full px-3 py-2 rounded-lg border">
            <input type="email" id="bkEmail" placeholder="Email" class="w-full px-3 py-2 rounded-lg border">
            <textarea id="bkComment" rows="2" placeholder="Комментарий..." class="w-full px-3 py-2 rounded-lg border resize-none"></textarea>
            <button type="submit" class="w-full py-2.5 rounded-lg btn-primary font-semibold">✅ Записаться</button>
        </form>
    </div>
</div>

<div id="mMy" class="fixed inset-0 z-50 hidden items-center justify-center modal-bg">
    <div class="glass rounded-2xl p-6 max-w-lg w-full mx-4 fade-in">
        <div class="flex justify-between mb-4"><h3 class="text-lg font-bold">📋 Мои записи</h3><button class="closeModalBtn text-slate-400 hover:text-white text-2xl">&times;</button></div>
        <div id="myList" class="space-y-2 max-h-80 overflow-y-auto"></div>
    </div>
</div>

<div id="mAdmin" class="fixed inset-0 z-50 hidden items-center justify-center modal-bg">
    <div class="glass rounded-2xl p-5 max-w-4xl w-full mx-4 fade-in max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between mb-4"><h3 class="text-lg font-bold">⚙️ Панель администратора</h3><button class="closeModalBtn text-slate-400 hover:text-white text-2xl">&times;</button></div>
        <div class="flex gap-2 mb-4 border-b border-white/10 pb-3">
            <button data-tab="slots" class="adm-tab px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white">📅 Управление слотами</button>
            <button data-tab="classes" class="adm-tab px-4 py-2 rounded-lg text-sm font-medium glass text-slate-400">📚 Типы занятий</button>
            <button data-tab="bookings" class="adm-tab px-4 py-2 rounded-lg text-sm font-medium glass text-slate-400">📋 Все записи</button>
        </div>
        
        <!-- Вкладка: Типы занятий -->
        <div id="tab-classes" class="hidden space-y-3">
            <div class="bg-white/5 rounded-xl p-4">
                <h4 class="font-semibold mb-3 text-sm text-blue-400">➕ Добавить новый вид занятия</h4>
                <form id="addClassForm" class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <input type="text" id="ncName" placeholder="Название *" required class="px-3 py-2 rounded-lg border text-sm">
                    <input type="text" id="ncTeacher" placeholder="Преподаватель" class="px-3 py-2 rounded-lg border text-sm">
                    <input type="number" id="ncDuration" placeholder="Минуты" value="60" class="px-3 py-2 rounded-lg border text-sm">
                    <input type="text" id="ncEmoji" placeholder="Эмодзи" value="📚" class="px-3 py-2 rounded-lg border text-sm">
                    <button type="submit" class="col-span-full md:col-span-1 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-sm font-medium">➕ Добавить</button>
                </form>
            </div>
            <div id="classesList" class="space-y-2 scrollable-list"></div>
        </div>
        
        <!-- Вкладка: Слоты (ВСЕ слоты) -->
        <div id="tab-slots" class="space-y-3">
            <div class="bg-white/5 rounded-xl p-4">
                <h4 class="font-semibold mb-3 text-sm text-blue-400">➕ Создать новые слоты</h4>
                <form id="addSlotsForm" class="space-y-3">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div><label class="text-xs text-slate-400 block mb-1">Дата начала недели</label><input type="date" id="sWeek" required class="w-full px-3 py-2 rounded-lg border text-sm"></div>
                        <div><label class="text-xs text-slate-400 block mb-1">Тип занятия</label><select id="sClass" class="w-full px-3 py-2 rounded-lg border text-sm"></select></div>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Дни недели</label>
                        <div class="flex flex-wrap gap-2" id="dayCheckboxes"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div><label class="text-xs text-slate-400 block mb-1">Начало</label><input type="time" id="sTStart" value="09:00" required class="w-full px-3 py-2 rounded-lg border text-sm"></div>
                        <div><label class="text-xs text-slate-400 block mb-1">Конец</label><input type="time" id="sTEnd" value="10:00" required class="w-full px-3 py-2 rounded-lg border text-sm"></div>
                        <div><label class="text-xs text-slate-400 block mb-1">Макс. мест</label><input type="number" id="sMax" value="2" min="1" class="w-full px-3 py-2 rounded-lg border text-sm"></div>
                    </div>
                    <button type="submit" class="w-full py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-sm font-medium">🚀 Создать слоты</button>
                </form>
            </div>
            
            <div class="flex justify-between items-center mt-4">
                <h4 class="font-semibold text-sm text-blue-400">📋 Все существующие слоты</h4>
                <button id="refreshSlotsBtn" class="text-xs text-blue-400 hover:text-blue-300 px-3 py-1 rounded glass">🔄 Обновить список</button>
            </div>
            <div id="slotsList" class="space-y-2 scrollable-list"></div>
        </div>
        
        <!-- Вкладка: Все записи -->
        <div id="tab-bookings" class="hidden space-y-3">
            <div class="flex justify-between items-center">
                <h4 class="font-semibold text-sm text-blue-400">📋 Все записи клиентов</h4>
                <button id="refreshBookingsBtn" class="text-xs text-blue-400 hover:text-blue-300 px-3 py-1 rounded glass">🔄 Обновить</button>
            </div>
            <div id="allBookingsList" class="space-y-2 scrollable-list"></div>
        </div>
    </div>
</div>

<div id="toast" class="fixed bottom-5 right-5 z-[60] hidden"><div class="glass rounded-xl px-5 py-3 fade-in flex items-center gap-2 text-sm"><span id="toastI"></span><span id="toastT"></span></div></div>

<script>
// ==================== НАСТРОЙКИ SUPABASE ====================
// ⚠️ ВАЖНО: ЗАМЕНИТЕ НА ВАШИ ДАННЫЕ ИЗ SUPABASE!
const SUPABASE_URL = 'https://kykltcbhvgvtzzfnspfw.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_stYfC8dqXjZKw56AExgjqg_xFzmkOaF';
// СОЗДАЁМ КЛИЕНТ
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== ПЕРЕМЕННЫЕ ====================
let currentWeekOffset = 0;
let selectedDate = null;
let selectedSlotId = null;
let currentFilter = 'all';
let isAdmin = false;
let clientUid = localStorage.getItem('client_uid');
let allClasses = [];

const dayNames = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
const monthNames = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
const dayNamesFull = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

// ==================== ОСНОВНЫЕ ФУНКЦИИ ====================
async function loadClasses() {
    const { data, error } = await supabaseClient.from('class_types').select('*').order('id');
    if (!error) allClasses = data;
    else console.error('Ошибка загрузки классов:', error);
    return allClasses;
}

async function loadSlotsForDate(date) {
    const { data: slots, error } = await supabaseClient
        .from('slots')
        .select('*, class_types(*)')
        .eq('slot_date', date)
        .order('time_start');
    if (error) return [];
    
    if (slots.length && clientUid) {
        const { data: bookings } = await supabaseClient
            .from('bookings')
            .select('*')
            .in('slot_id', slots.map(s => s.id))
            .eq('status', 'active')
            .eq('client_uid', clientUid);
        
        const bookingMap = new Map();
        bookings?.forEach(b => bookingMap.set(b.slot_id, true));
        slots.forEach(slot => { slot.isMyBooking = bookingMap.has(slot.id); });
    }
    
    const { data: allBookings } = await supabaseClient
        .from('bookings')
        .select('slot_id')
        .in('slot_id', slots.map(s => s.id))
        .eq('status', 'active');
    
    const bookingCount = {};
    allBookings?.forEach(b => bookingCount[b.slot_id] = (bookingCount[b.slot_id] || 0) + 1);
    slots.forEach(slot => { slot.currentBookings = bookingCount[slot.id] || 0; });
    return slots;
}

async function updateStats() {
    const { data: slots } = await supabaseClient.from('slots').select('id, max_capacity');
    const { data: bookings } = await supabaseClient.from('bookings').select('slot_id').eq('status', 'active');
    const bookingCount = {};
    bookings?.forEach(b => bookingCount[b.slot_id] = (bookingCount[b.slot_id] || 0) + 1);
    let free = 0, busy = 0;
    slots?.forEach(slot => {
        if ((bookingCount[slot.id] || 0) >= slot.max_capacity) busy++;
        else free++;
    });
    document.getElementById('stFree').textContent = free;
    document.getElementById('stBusy').textContent = busy;
    document.getElementById('stTotal').textContent = slots?.length || 0;
    document.getElementById('stTypes').textContent = allClasses.length;
}

function getWeekDates(offset) {
    const today = new Date();
    const monday = new Date(today);
    monday.setDate(today.getDate() - today.getDay() + 1 + offset * 7);
    return Array.from({length: 7}, (_, i) => {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        return d;
    });
}

async function renderDays() {
    const dates = getWeekDates(currentWeekOffset);
    const start = dates[0], end = dates[6];
    document.getElementById('weekLabel').textContent = `${start.getDate()} ${monthNames[start.getMonth()]} — ${end.getDate()} ${monthNames[end.getMonth()]} ${end.getFullYear()}`;
    const todayStr = new Date().toISOString().split('T')[0];
    const container = document.getElementById('dayTabs');
    container.innerHTML = dates.map(d => {
        const dateStr = d.toISOString().split('T')[0];
        const isActive = dateStr === selectedDate;
        const isToday = dateStr === todayStr;
        return `<button data-date="${dateStr}" class="day-btn day-tab ${isActive ? 'active' : ''} rounded-lg py-2.5 text-center transition-all ${isToday && !isActive ? 'ring-1 ring-blue-500' : ''}">
            <div class="text-[10px] opacity-70">${dayNames[d.getDay()]}</div>
            <div class="text-base font-bold">${d.getDate()}</div>
        </button>`;
    }).join('');
    document.querySelectorAll('.day-btn').forEach(btn => {
        btn.addEventListener('click', () => selectDate(btn.dataset.date));
    });
}

function selectDate(dateStr) {
    selectedDate = dateStr;
    renderDays();
    renderSchedule();
}

function changeWeek(delta) {
    currentWeekOffset += delta;
    renderDays();
    renderSchedule();
}

async function renderFilters() {
    const container = document.getElementById('filterBtns');
    container.innerHTML = allClasses.map(c => 
        `<button data-filter="${c.id}" class="filter-item filter-btn px-3 py-1 rounded-full text-xs font-medium glass text-slate-400 transition-all">${c.emoji} ${c.name}</button>`
    ).join('');
    document.querySelectorAll('.filter-item').forEach(btn => {
        btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
    });
}

function applyFilter(filterId) {
    currentFilter = filterId;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('bg-blue-600', 'text-white');
        btn.classList.add('glass', 'text-slate-400');
    });
    const activeBtn = document.querySelector(`[data-filter="${filterId}"]`);
    if (activeBtn) {
        activeBtn.classList.add('bg-blue-600', 'text-white');
        activeBtn.classList.remove('glass', 'text-slate-400');
    }
    if (filterId === 'all') {
        const allBtn = document.querySelector('[data-filter="all"]');
        if (allBtn) {
            allBtn.classList.add('bg-blue-600', 'text-white');
            allBtn.classList.remove('glass', 'text-slate-400');
        }
    }
    renderSchedule();
}

async function renderSchedule() {
    let slots = await loadSlotsForDate(selectedDate);
    if (currentFilter !== 'all') {
        slots = slots.filter(s => s.class_id === parseInt(currentFilter));
    }
    const container = document.getElementById('grid');
    if (!slots.length) {
        container.innerHTML = '<div class="text-center py-10 text-slate-500"><div class="text-4xl mb-3">📭</div><p>Нет занятий</p></div>';
        return;
    }
    container.innerHTML = slots.map(slot => {
        const isFull = slot.currentBookings >= slot.max_capacity;
        let slotClass = '', statusText = '', actionButton = '';
        if (slot.isMyBooking) {
            slotClass = 'slot-my';
            statusText = `Ваша запись (${slot.currentBookings}/${slot.max_capacity})`;
            actionButton = `<button class="cancel-booking-btn text-xs text-red-400 hover:text-red-300 underline" data-slot="${slot.id}">Отменить</button>`;
        } else if (isFull) {
            slotClass = 'slot-occupied';
            statusText = `Занято (${slot.currentBookings}/${slot.max_capacity})`;
            actionButton = '';
        } else {
            slotClass = 'slot-free';
            statusText = `Свободно (${slot.max_capacity - slot.currentBookings} мест)`;
            actionButton = `<button class="book-slot-btn text-xs text-white hover:underline" data-slot="${slot.id}">Записаться</button>`;
        }
        const classInfo = slot.class_types;
        return `<div class="${slotClass} rounded-xl p-3 transition-all duration-200 fade-in">
            <div class="flex items-center justify-between gap-3">
                <div class="flex items-center gap-3">
                    <div class="text-2xl">${classInfo?.emoji || '📚'}</div>
                    <div>
                        <div class="font-semibold text-sm">${classInfo?.name || 'Занятие'}</div>
                        <div class="text-xs text-slate-300">🕐 ${slot.time_start}—${slot.time_end} · ${classInfo?.duration_minutes || 0} мин${classInfo?.teacher ? ' · 👤 ' + classInfo.teacher : ''}</div>
                    </div>
                </div>
                <div class="text-right flex-shrink-0">
                    <div class="text-xs font-medium mb-0.5">${statusText}</div>
                    ${actionButton}
                </div>
            </div>
        </div>`;
    }).join('');
    
    document.querySelectorAll('.book-slot-btn').forEach(btn => {
        btn.addEventListener('click', () => openBookingModal(btn.dataset.slot));
    });
    document.querySelectorAll('.cancel-booking-btn').forEach(btn => {
        btn.addEventListener('click', () => cancelBooking(btn.dataset.slot));
    });
}

function openBookingModal(slotId) {
    selectedSlotId = slotId;
    const modal = document.getElementById('mBooking');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    loadSlotsForDate(selectedDate).then(slots => {
        const slot = slots.find(s => s.id === slotId);
        if (slot?.class_types) {
            const d = new Date(selectedDate);
            document.getElementById('bkInfo').innerHTML = `<div class="flex items-center gap-2"><span class="text-xl">${slot.class_types.emoji}</span><div><div class="font-semibold">${slot.class_types.name}</div><div class="text-slate-400">${d.getDate()} ${monthNames[d.getMonth()]} · ${slot.time_start}—${slot.time_end}${slot.class_types.teacher ? ' · ' + slot.class_types.teacher : ''}</div></div></div>`;
        }
    });
}

async function handleBooking(event) {
    event.preventDefault();
    const name = document.getElementById('bkName').value.trim();
    const phone = document.getElementById('bkPhone').value.trim();
    const email = document.getElementById('bkEmail').value.trim();
    const comment = document.getElementById('bkComment').value.trim();
    if (!name || !phone) {
        showToast('❌', 'Заполните имя и телефон');
        return;
    }
    if (!clientUid) {
        clientUid = 'u' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('client_uid', clientUid);
    }
    const { error } = await supabaseClient.from('bookings').insert([{
        slot_id: selectedSlotId,
        client_uid: clientUid,
        client_name: name,
        client_phone: phone,
        client_email: email || null,
        comment: comment || null,
        status: 'active'
    }]);
    if (error) {
        showToast('❌', 'Ошибка: ' + error.message);
        return;
    }
    showToast('✅', 'Вы записаны!');
    closeModal('mBooking');
    document.getElementById('bookingForm').reset();
    await renderSchedule();
    await updateStats();
}

async function cancelBooking(slotId) {
    if (!confirm('Отменить запись?')) return;
    const { error } = await supabaseClient
        .from('bookings')
        .update({ status: 'cancelled', cancelled_at: new Date().toISOString() })
        .eq('slot_id', slotId)
        .eq('client_uid', clientUid)
        .eq('status', 'active');
    if (error) {
        showToast('❌', 'Ошибка: ' + error.message);
        return;
    }
    showToast('🗑️', 'Запись отменена');
    await renderSchedule();
    await updateStats();
}

async function showMyBookings() {
    if (!clientUid) {
        document.getElementById('myList').innerHTML = '<div class="text-center py-8 text-slate-500"><div class="text-3xl mb-2">📋</div><p>Нет записей</p></div>';
        document.getElementById('mMy').classList.remove('hidden');
        document.getElementById('mMy').classList.add('flex');
        return;
    }
    const { data: bookings } = await supabaseClient
        .from('bookings')
        .select('*, slots(*, class_types(*))')
        .eq('client_uid', clientUid)
        .eq('status', 'active')
        .order('booked_at', { ascending: false });
    const container = document.getElementById('myList');
    if (!bookings?.length) {
        container.innerHTML = '<div class="text-center py-8 text-slate-500"><div class="text-3xl mb-2">📋</div><p>Нет записей</p></div>';
    } else {
        container.innerHTML = bookings.map(b => {
            const slot = b.slots;
            const classInfo = slot?.class_types;
            const isPast = new Date(slot?.slot_date) < new Date(new Date().toDateString());
            return `<div class="bg-white/5 rounded-lg p-3 fade-in ${isPast ? 'opacity-40' : ''}">
                <div class="flex items-center justify-between">
                    <div><span class="text-lg">${classInfo?.emoji || '📚'}</span>
                        <div class="font-medium text-sm">${classInfo?.name || 'Занятие'} ${isPast ? '<span class="text-[10px] text-slate-500">(прошло)</span>' : ''}</div>
                        <div class="text-xs text-slate-400">${slot ? new Date(slot.slot_date).getDate() + ' ' + monthNames[new Date(slot.slot_date).getMonth()] + ' · ' + slot.time_start + '—' + slot.time_end : ''}</div>
                    </div>
                    ${!isPast ? `<button class="cancel-booking-modal-btn text-xs text-red-400 hover:text-red-300 underline" data-slot="${b.slot_id}">Отменить</button>` : ''}
                </div>
            </div>`;
        }).join('');
    }
    document.querySelectorAll('.cancel-booking-modal-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            await cancelBooking(btn.dataset.slot);
            await showMyBookings();
        });
    });
    document.getElementById('mMy').classList.remove('hidden');
    document.getElementById('mMy').classList.add('flex');
}

        isAdmin = true;

async function handleAddSlots(event) {
    event.preventDefault();
    
    const weekStart = document.getElementById('sWeek').value;
    const classId = parseInt(document.getElementById('sClass').value);
    const startTime = document.getElementById('sTStart').value;
    const endTime = document.getElementById('sTEnd').value;
    const maxCapacity = parseInt(document.getElementById('sMax').value) || 1;
    
    const selectedDays = [];
    document.querySelectorAll('#tab-slots input[type=checkbox]:checked').forEach(cb => {
        selectedDays.push(parseInt(cb.value));
    });
    
    if (!selectedDays.length) {
        showToast('❌', 'Выберите хотя бы один день');
        return;
    }
    
    const weekStartDate = new Date(weekStart);
    let created = 0;
    let errors = [];
    
    for (const day of selectedDays) {
        const slotDate = new Date(weekStartDate);
        slotDate.setDate(weekStartDate.getDate() + (day - weekStartDate.getDay() + 7) % 7);
        const dateStr = slotDate.toISOString().split('T')[0];
        const slotId = `s${dateStr.replace(/-/g, '')}c${classId}${startTime.replace(':', '')}`;
        
        const { data: existing, error: checkError } = await supabaseClient
            .from('slots')
            .select('id')
            .eq('id', slotId)
            .maybeSingle();
        
        if (checkError) {
            console.error('Ошибка проверки:', checkError);
            errors.push(`${dateStr}: ${checkError.message}`);
            continue;
        }
        
        if (!existing) {
            const { error: insertError } = await supabaseClient
                .from('slots')
                .insert([{
                    id: slotId,
                    class_id: classId,
                    slot_date: dateStr,
                    time_start: startTime,
                    time_end: endTime,
                    max_capacity: maxCapacity
                }]);
            
            if (insertError) {
                console.error('Ошибка вставки:', insertError);
                errors.push(`${dateStr}: ${insertError.message}`);
            } else {
                created++;
            }
        }
    }
    
    if (errors.length > 0) {
        showToast('⚠️', `Создано ${created} слотов. Ошибки: ${errors[0]}`);
    } else {
        showToast('✅', `Создано ${created} слотов`);
    }
    
    await refreshAdminSlots();
    await renderSchedule();
    await updateStats();
}

// ==================== ИСПРАВЛЕННАЯ ФУНКЦИЯ - ПОКАЗЫВАЕТ ВСЕ СЛОТЫ ====================
async function refreshAdminSlots() {
    // Загружаем ВСЕ слоты из базы данных
    const { data: slots, error } = await supabaseClient
        .from('slots')
        .select('*, class_types(*)')
        .order('slot_date', { ascending: false })
        .order('time_start', { ascending: true });
    
    if (error) {
        console.error('Ошибка загрузки слотов:', error);
        document.getElementById('slotsList').innerHTML = '<div class="text-center text-red-400 py-4 text-sm">❌ Ошибка загрузки слотов</div>';
        return;
    }
    
    const { data: bookings } = await supabaseClient.from('bookings').select('slot_id').eq('status', 'active');
    const bookingCount = {};
    bookings?.forEach(b => bookingCount[b.slot_id] = (bookingCount[b.slot_id] || 0) + 1);
    
    const container = document.getElementById('slotsList');
    if (!slots?.length) {
        container.innerHTML = '<div class="text-center text-slate-500 py-8 text-sm">📭 Нет созданных слотов. Создайте первый слот выше.</div>';
        return;
    }
    
    // Группируем слоты по месяцам для удобства
    const groupedSlots = {};
    slots.forEach(slot => {
        const date = new Date(slot.slot_date);
        const monthKey = `${date.getFullYear()}-${date.getMonth() + 1}`;
        const monthName = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
        if (!groupedSlots[monthKey]) {
            groupedSlots[monthKey] = { name: monthName, slots: [] };
        }
        groupedSlots[monthKey].slots.push(slot);
    });
    
    let html = '';
    for (const [key, group] of Object.entries(groupedSlots)) {
        html += `<div class="mb-4">
            <div class="text-xs font-semibold text-blue-400 mb-2 sticky top-0 bg-slate-800/95 py-1.5 px-2 rounded-lg">📅 ${group.name}</div>
            <div class="space-y-1.5">
        `;
        html += group.slots.map(slot => {
            const currentBookings = bookingCount[slot.id] || 0;
            const date = new Date(slot.slot_date);
            const isPast = date < new Date(new Date().toDateString());
            const isFull = currentBookings >= slot.max_capacity;
            return `
                <div class="bg-white/5 rounded-lg p-2.5 flex justify-between items-center fade-in ${isPast ? 'opacity-40' : ''} hover:bg-white/10 transition-all">
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">${slot.class_types?.emoji || '📚'}</span>
                            <span class="text-sm font-medium">${slot.class_types?.name || 'Занятие'}</span>
                            ${isPast ? '<span class="text-[9px] text-slate-500 bg-black/30 px-1.5 py-0.5 rounded">прошёл</span>' : ''}
                            ${isFull && !isPast ? '<span class="text-[9px] text-red-400 bg-red-500/20 px-1.5 py-0.5 rounded">полный</span>' : ''}
                        </div>
                        <div class="text-[10px] text-slate-400 mt-1">
                            📅 ${dayNamesFull[date.getDay()]}, ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()} · 
                            ⏰ ${slot.time_start}—${slot.time_end} · 
                            👥 <span class="${isFull ? 'text-red-400' : 'text-emerald-400'}">${currentBookings}/${slot.max_capacity}</span>
                        </div>
                    </div>
                    <button class="delete-slot-btn text-red-400 hover:text-red-300 text-xs px-2 py-1 rounded hover:bg-red-400/10 transition-all ml-2" data-id="${slot.id}" title="Удалить слот">
                        🗑️
                    </button>
                </div>
            `;
        }).join('');
        html += `</div></div>`;
    }
    
    container.innerHTML = html;
    
    document.querySelectorAll('.delete-slot-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteSlot(btn.dataset.id));
    });
}

async function deleteSlot(slotId) {
    if (!confirm('🗑️ Удалить этот слот? Все записи на него также будут удалены.')) return;
    const { error } = await supabaseClient.from('slots').delete().eq('id', slotId);
    if (error) {
        showToast('❌', 'Ошибка: ' + error.message);
        console.error('Ошибка удаления слота:', error);
    } else {
        showToast('🗑️', 'Слот удалён');
        await refreshAdminSlots();
        await renderSchedule();
        await updateStats();
    }
}

async function refreshAdminBookings() {
    const { data: bookings, error } = await supabaseClient
        .from('bookings')
        .select('*, slots(*, class_types(*))')
        .eq('status', 'active')
        .order('booked_at', { ascending: false });
    
    if (error) {
        console.error('Ошибка загрузки записей:', error);
        document.getElementById('allBookingsList').innerHTML = '<div class="text-center text-red-400 py-4 text-sm">❌ Ошибка загрузки</div>';
        return;
    }
    
    const container = document.getElementById('allBookingsList');
    if (!bookings?.length) {
        container.innerHTML = '<div class="text-center text-slate-500 py-8 text-sm">📭 Нет активных записей</div>';
        return;
    }
    
    container.innerHTML = bookings.map(b => {
        const slot = b.slots;
        const classInfo = slot?.class_types;
        const bookingDate = new Date(b.booked_at);
        const slotDate = slot ? new Date(slot.slot_date) : null;
        const isPast = slotDate && slotDate < new Date(new Date().toDateString());
        return `
            <div class="bg-white/5 rounded-lg p-3 fade-in ${isPast ? 'opacity-40' : ''}">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">${classInfo?.emoji || '📚'}</span>
                            <span class="text-sm font-medium">${classInfo?.name || 'Занятие'}</span>
                            ${isPast ? '<span class="text-[9px] text-slate-500 bg-black/30 px-1.5 py-0.5 rounded">прошло</span>' : ''}
                        </div>
                        <div class="text-xs text-slate-400 mt-1">
                            👤 ${b.client_name} · 📞 ${b.client_phone}${b.client_email ? ' · ✉️ ' + b.client_email : ''}
                        </div>
                        <div class="text-[10px] text-slate-500 mt-1">
                            📅 ${slot ? dayNamesFull[slotDate.getDay()] + ', ' + slotDate.getDate() + ' ' + monthNames[slotDate.getMonth()] + ' · ⏰ ' + slot.time_start + '—' + slot.time_end : '—'}
                        </div>
                        <div class="text-[9px] text-slate-600 mt-1">📝 Записано: ${bookingDate.toLocaleString('ru-RU')}</div>
                        ${b.comment ? `<div class="text-[10px] text-slate-500 mt-1 italic">💬 ${b.comment}</div>` : ''}
                    </div>
                    <button class="admin-cancel-btn text-red-400 hover:text-red-300 text-xs px-2 py-1 rounded hover:bg-red-400/10 transition-all ml-2" data-id="${b.id}" title="Отменить запись">
                        🗑️ Отменить
                    </button>
                </div>
            </div>
        `;
    }).join('');
    
    document.querySelectorAll('.admin-cancel-btn').forEach(btn => {
        btn.addEventListener('click', () => adminCancelBooking(parseInt(btn.dataset.id)));
    });
}

async function adminCancelBooking(bookingId) {
    if (!confirm('Отменить эту запись?')) return;
    const { error } = await supabaseClient.from('bookings').update({ status: 'cancelled', cancelled_at: new Date().toISOString() }).eq('id', bookingId);
    if (error) {
        showToast('❌', 'Ошибка: ' + error.message);
    } else {
        showToast('🗑️', 'Запись отменена');
        await refreshAdminBookings();
        await renderSchedule();
        await updateStats();
    }
}

// ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
function closeModal(modalId) {
    const modal = document.getElementById(modalId);
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function showToast(icon, text) {
    const toast = document.getElementById('toast');
    document.getElementById('toastI').textContent = icon;
    document.getElementById('toastT').textContent = text;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
}

function renderDayCheckboxes() {
    const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
    const values = [1, 2, 3, 4, 5, 6, 0];
    const container = document.getElementById('dayCheckboxes');
    container.innerHTML = days.map((day, i) => `
        <label class="flex items-center gap-1.5 px-2 py-1 rounded bg-white/5 cursor-pointer text-xs hover:bg-white/10 transition-all">
            <input type="checkbox" value="${values[i]}" class="accent-blue-500"> ${day}
        </label>
    `).join('');
}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
(async function init() {
    const today = new Date();
    selectedDate = today.toISOString().split('T')[0];
    
    await loadClasses();
    await renderDays();
    await renderFilters();
    await renderSchedule();
    await updateStats();
    await refreshAdminClassSelect();
    renderDayCheckboxes();
    
    const monday = new Date(today);
    monday.setDate(today.getDate() - today.getDay() + 1);
    const weekStartInput = document.getElementById('sWeek');
    if (weekStartInput) weekStartInput.value = monday.toISOString().split('T')[0];
    
    // Обработчики событий
    document.getElementById('prevWeekBtn').addEventListener('click', () => changeWeek(-1));
    document.getElementById('nextWeekBtn').addEventListener('click', () => changeWeek(1));
    document.getElementById('adminBtn').addEventListener('click', toggleAdmin);
    document.getElementById('myBookingsBtn').addEventListener('click', showMyBookings);
    
    document.querySelectorAll('[data-filter="all"]').forEach(btn => {
        btn.addEventListener('click', () => applyFilter('all'));
    });
    
    document.getElementById('bookingForm').addEventListener('submit', handleBooking);
    document.getElementById('addClassForm').addEventListener('submit', handleAddClass);
    document.getElementById('addSlotsForm').addEventListener('submit', handleAddSlots);
    
    document.querySelectorAll('.adm-tab').forEach(btn => {
        btn.addEventListener('click', () => switchAdminTab(btn.dataset.tab));
    });
    
    const refreshSlotsBtn = document.getElementById('refreshSlotsBtn');
    if (refreshSlotsBtn) {
        refreshSlotsBtn.addEventListener('click', async () => {
            await refreshAdminSlots();
            showToast('🔄', 'Список слотов обновлён');
        });
    }
    
    const refreshBookingsBtn = document.getElementById('refreshBookingsBtn');
    if (refreshBookingsBtn) {
        refreshBookingsBtn.addEventListener('click', async () => {
            await refreshAdminBookings();
            showToast('🔄', 'Список записей обновлён');
        });
    }
    
    document.querySelectorAll('.closeModalBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const modal = e.target.closest('.modal-bg');
            if (modal) closeModal(modal.id);
        });
    });
    
    document.querySelectorAll('.modal-bg').forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal(modal.id);
        });
    });
})();
</script>
